<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ombor Boshqaruv Tizimi</title>
    <style>
        /* Standart o'zgaruvchilar (Tungi rejim ranglari) */
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --danger-color: #f87171;
            --header-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        /* Kunduzgi rejim ranglari (Light Mode) */
        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --accent-color: #0284c7;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --header-gradient: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.2s, border-color 0.2s; 
            -webkit-tap-highlight-color: transparent; /* iOS qora soyasini yo'qotish */
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Rejim almashtirish tugmasi (iOS uslubida) */
        .theme-toggle-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }
        .theme-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header { 
            background: var(--header-gradient);
            padding: 20px 14px; 
            border-radius: 14px; 
            margin-bottom: 16px; 
            text-align: center; 
            border: 1px solid var(--border-color);
        }

        header h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }

        .balance-card { 
            background: rgba(74, 222, 128, 0.1); 
            color: var(--success-color); 
            padding: 10px 16px; 
            border-radius: 10px; 
            display: inline-block; 
            font-size: 15px; 
            font-weight: 700; 
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        
        /* iPhone uchun gorizontal menyu navigatsiyasi */
        .categories-menu { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 4px 0 12px 0; 
            margin-bottom: 16px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch; /* iOS tezkor skroll */
        }
        .categories-menu::-webkit-scrollbar { display: none; }

        .category-btn { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            padding: 10px 16px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            white-space: nowrap; 
        }
        .category-btn.active { 
            background: var(--accent-color); 
            color: #ffffff !important;
            border-color: var(--accent-color);
        }

        .controls-panel { 
            background: var(--panel-bg); 
            padding: 16px; 
            border-radius: 14px; 
            margin-bottom: 16px; 
            display: none; 
            border: 1px solid var(--border-color);
        }
        .controls-panel.show { display: block; }
        
        /* Mobil moslashuvchan forma */
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group input { 
            background: var(--bg-color);
            color: var(--text-color);
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            width: 100%; 
            font-size: 15px;
            outline: none;
            -webkit-appearance: none; /* iOS standart stilini yo'qotish */
        }
        
        .file-input-wrapper {
            position: relative;
            background: rgba(56, 189, 248, 0.05);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 14px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
        }

        .add-btn { 
            background: var(--accent-color); 
            color: #ffffff; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 15px;
        }

        /* iPhone uchun jadval dizaynini kartochkaga o'zgartirish (Eng muhim joyi) */
        .table-container { background: transparent; margin-bottom: 24px; }
        
        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; } /* Mobil ekranlarda tepa sarlavha yo'qoladi */
            
            tr {
                background: var(--panel-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 12px;
                position: relative;
            }

            td {
                border: none;
                padding: 6px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
            }

            td:first-child {
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
                margin-bottom: 6px;
                display: block; /* Tovar rasmi va nomi tepada chiroyli turishi uchun */
            }

            /* Mobil ekranda har bir qatorga tushuntirish yozuvi qo'shish */
            td:nth-child(2)::before { content: "Dona narxi:"; color: var(--text-muted); font-weight: 500; }
            td:nth-child(3)::before { content: "Jami qiymat:"; color: var(--text-muted); font-weight: 500; }
            td:nth-child(4)::before { content: "Holati:"; color: var(--text-muted); font-weight: 500; }
            td:nth-child(5) {
                justify-content: flex-end;
                padding-top: 10px;
                border-top: 1px dashed var(--border-color);
                margin-top: 6px;
            }
        }

        /* Katta ekranlar (Kompyuter) uchun standart jadval rejimi */
        @media (min-width: 768px) {
            body { padding: 24px; }
            header h1 { font-size: 28px; }
            .table-container { background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; }
            table { width: 100%; border-collapse: collapse; }
            th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
            th { background-color: rgba(15, 23, 42, 0.2); color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
            .form-group { flex-direction: row; }
            .form-group input, .file-input-wrapper { flex: 1; }
        }
        
        .product-flex { display: flex; align-items: center; gap: 12px; }
        .product-img { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; background: #334155; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .product-title { font-weight: 600; color: var(--text-color); font-size: 15px; }
        .product-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .status-bor { background: rgba(74, 222, 128, 0.1); color: var(--success-color); }
        .status-yoq { background: rgba(248, 113, 113, 0.1); color: var(--danger-color); }
        
        .delete-btn { background: rgba(248, 113, 113, 0.1); color: var(--danger-color); border: 1px solid rgba(248, 113, 113, 0.2); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }

        footer { margin-top: auto; text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border-color); }
        footer strong { color: var(--accent-color); font-weight: 600; }
    </style>
</head>
<body>

    <div class="theme-toggle-container">
        <button class="theme-btn" onclick="toggleTheme()">
            <span id="theme-icon">☀️</span> <span id="theme-text">Light Mode</span>
        </button>
    </div>

    <header>
        <h1>🏪 Do'kon "Ombor" Tizimi</h1>
        <div class="balance-card">💰 Umumiy Qiymat: <span id="total-shop-balance">0</span> so'm</div>
    </header>

    <div class="categories-menu" id="categories-list">
        <button class="category-btn active" onclick="filterCategory('all', event)">🔥 Hammasi</button>
        <button class="category-btn" onclick="filterCategory('Choylar', event)">☕ Choylar</button>
        <button class="category-btn" onclick="filterCategory('Shirinliklar', event)">🍬 Shirinliklar</button>
        <button class="category-btn" onclick="filterCategory('Pecheniylar', event)">🍪 Pecheniylar</button>
        <button class="category-btn" onclick="filterCategory('Sabzavotlar', event)">🥕 Sabzavotlar</button>
        <button class="category-btn" onclick="filterCategory('Kalbasalar', event)">🍖 Kalbasalar</button>
        <button class="category-btn" onclick="filterCategory('Ovqat mahsulotlari', event)">🍲 Ovqat mahsulotlari</button>
        <button class="category-btn" onclick="filterCategory('Go\'shtlar', event)">🥩 Go'shtlar</button>
        <button class="category-btn" onclick="filterCategory('O\'yinchoqlar', event)">🧸 O'yinchoqlar</button>
        <button class="category-btn" onclick="filterCategory('Oshxona bo\'limi', event)">🍽️ Oshxona bo'limi</button>
        <button class="category-btn" onclick="filterCategory('Ayollar bo\'limi', event)">👜 Ayollar bo'limi</button>
        <button class="category-btn" onclick="filterCategory('Suvlar', event)">💧 Suvlar</button>
        <button class="category-btn" onclick="filterCategory('Boshqa narsalar', event)">📦 Boshqa narsalar</button>
    </div>

    <div class="controls-panel" id="add-panel">
        <h3 id="panel-title" style="margin-bottom: 12px; color: var(--accent-color); font-size: 15px;"></h3>
        <div class="form-group">
            <input type="text" id="p-name" placeholder="Mahsulot nomi">
            <input type="number" id="p-price" placeholder="Dona/Kg narxi">
            <input type="number" id="p-qty" placeholder="Soni (Dona/Kg)">
            
            <div class="file-input-wrapper">
                <span id="file-label">📸 Suratni yuklash</span>
                <input type="file" id="p-image" accept="image/*" onchange="previewImageName()">
            </div>

            <button class="add-btn" onclick="addNewProduct()">➕ Omborga Qo'shish</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mahsulot</th>
                    <th>Dona Narxi</th>
                    <th>Jami Qiymati</th>
                    <th>Status</th>
                    <th>Amal</th>
                </tr>
            </thead>
            <tbody id="products-table-body"></tbody>
        </table>
    </div>

    <footer>
        Created by <strong>@old_crt</strong>
    </footer>

    <script>
        // Ma'lumotlarni localStorage'dan yuklab olish yoki bo'sh massiv yaratish
        let mahsulotlar = JSON.parse(localStorage.getItem('ombor_mahsulotlar')) || [
            { id: 1, nomi: "Ahmad Choy 100gr", bolim: "Choylar", narxi: 18000, soni: 10, rasm: "" },
            { id: 2, nomi: "Coca-Cola 1.5L", bolim: "Suvlar", narxi: 12000, soni: 0, rasm: "" }
        ];

        let joriyBolim = 'all';
        let joriyRasmBase64 = "";

        // Tema rejimini saqlash va tiklash
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('theme-icon').innerText = "🌙";
            document.getElementById('theme-text').innerText = "Dark Mode";
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');

            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerText = "☀️";
                themeText.innerText = "Light Mode";
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.innerText = "🌙";
                themeText.innerText = "Dark Mode";
                localStorage.setItem('theme', 'light');
            }
        }

        function previewImageName() {
            const file = document.getElementById('p-image').files[0];
            if (file) {
                document.getElementById('file-label').innerText = "✅ Rasm tayyor";
                const reader = new FileReader();
                reader.onloadend = function() { joriyRasmBase64 = reader.result; }
                reader.readAsDataURL(file);
            }
        }

        // Ma'lumotlarni local xotiraga saqlash funksiyasi
        function saveToLocalStorage() {
            localStorage.setItem('ombor_mahsulotlar', JSON.stringify(mahsulotlar));
        }

        function renderTable() {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '';

            const elanganMahsulotlar = mahsulotlar.filter(p => joriyBolim === 'all' || p.bolim === joriyBolim);

            elanganMahsulotlar.forEach(p => {
                const jamiQiymat = p.narxi * p.soni;
                const status = p.soni > 0 ? '<span class="status-badge status-bor">Bor</span>' : '<span class="status-badge status-yoq">Tugagan</span>';
                const rasmKodi = p.rasm ? `<img src="${p.rasm}" class="product-img">` : `<div class="product-img">📦</div>`;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="product-flex">
                                ${rasmKodi}
                                <div>
                                    <span class="product-title">${p.nomi}</span>
                                    <span class="product-meta">${p.bolim} • ${p.soni} dona/kg</span>
                                </div>
                            </div>
                        </td>
                        <td>${p.narxi.toLocaleString()} so'm</td>
                        <td><strong>${jamiQiymat.toLocaleString()} so'm</strong></td>
                        <td>${status}</td>
                        <td><button class="delete-btn" onclick="deleteProduct(${p.id})">❌ O'chirish</button></td>
                    </tr>
                `;
            });
        }

        function hisoblangUmumiyBalans() {
            let jami = 0;
            mahsulotlar.forEach(p => { jami += p.narxi * p.soni; });
            document.getElementById('total-shop-balance').innerText = jami.toLocaleString();
        }

        function filterCategory(bolimNomi, event) {
            joriyBolim = bolimNomi;
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }

            const addPanel = document.getElementById('add-panel');
            if(bolimNomi === 'all') {
                addPanel.classList.remove('show');
            } else {
                addPanel.classList.add('show');
                document.getElementById('panel-title').innerText = `➕ [${bolimNomi}] bo'limiga yangi tovar qo'shish`;
            }
            renderTable();
        }

        function addNewProduct() {
            const nomi = document.getElementById('p-name').value;
            const narxi = parseFloat(document.getElementById('p-price').value);
            const soni = parseFloat(document.getElementById('p-qty').value);

            if(!nomi || isNaN(narxi) || isNaN(soni)) {
                alert("Iltimos, barcha kataklarni to'ldiring!");
                return;
            }

            const yangiMahsulot = {
                id: Date.now(),
                nomi: nomi,
                bolim: joriyBolim,
                narxi: narxi,
                soni: soni,
                rasm: joriyRasmBase64
            };

            mahsulotlar.push(yangiMahsulot);
            saveToLocalStorage(); // Xotiraga saqlaymiz

            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-qty').value = '';
            document.getElementById('p-image').value = '';
            document.getElementById('file-label').innerText = "📸 Suratni yuklash";
            joriyRasmBase64 = "";

            renderTable();
            hisoblangUmumiyBalans();
        }

        function deleteProduct(id) {
            if(confirm("Ushbu mahsulotni ombordan butunlay o'chirmoqchimisiz?")) {
                mahsulotlar = mahsulotlar.filter(p => p.id !== id);
                saveToLocalStorage(); // Yangilangan ro'yxatni saqlaymiz
                renderTable();
                hisoblangUmumiyBalans();
            }
        }

        // Dastlabki ishga tushirish
        renderTable();
        hisoblangUmumiyBalans();
    </script>
</body>
</html>
