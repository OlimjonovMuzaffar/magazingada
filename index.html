<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ombor Boshqaruv Tizimi (Onlayn)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --danger-color: #f87171;
            --header-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --accent-color: #0284c7;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --header-gradient: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .admin-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: none;
        }

        .theme-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        header { 
            background: var(--header-gradient);
            padding: 20px 14px; 
            border-radius: 14px; 
            margin-bottom: 16px; 
            text-align: center; 
            border: 1px solid var(--border-color);
        }

        header h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }

        .balance-card { 
            background: rgba(74, 222, 128, 0.1); 
            color: var(--success-color); 
            padding: 10px 16px; 
            border-radius: 10px; 
            display: inline-block; 
            font-size: 15px; 
            font-weight: 700; 
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .search-container {
            position: relative;
            margin-bottom: 16px;
            width: 100%;
        }
        .search-input {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 14px 40px 14px 44px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
        }
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            display: none;
        }
        
        .categories-menu { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 4px 0 12px 0; 
            margin-bottom: 16px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories-menu::-webkit-scrollbar { display: none; }

        .category-btn { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            padding: 10px 16px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            white-space: nowrap; 
        }
        .category-btn.active { 
            background: var(--accent-color); 
            color: #ffffff !important;
            border-color: var(--accent-color);
        }

        .controls-panel { 
            background: var(--panel-bg); 
            padding: 16px; 
            border-radius: 14px; 
            margin-bottom: 16px; 
            border: 1px solid var(--border-color);
            display: none;
        }
        .controls-panel.show { display: block; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group input { 
            background: var(--bg-color);
            color: var(--text-color);
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            width: 100%; 
            font-size: 15px;
            outline: none;
        }
        
        .file-input-wrapper {
            position: relative;
            background: rgba(56, 189, 248, 0.05);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 14px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
        }

        .add-btn { 
            background: var(--accent-color); 
            color: #ffffff; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 15px;
        }

        .loading-text {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        .table-container { background: transparent; margin-bottom: 24px; }
        
        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                background: var(--panel-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 12px;
            }
            td {
                border: none;
                padding: 6px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
            }
            td:first-child {
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
                margin-bottom: 6px;
                display: block;
            }
            td:nth-child(2)::before { content: "Dona narxi:"; color: var(--text-muted); }
            td:nth-child(3)::before { content: "Jami qiymat:"; color: var(--text-muted); }
            td:nth-child(4)::before { content: "Holati:"; color: var(--text-muted); }
            td:nth-child(5) {
                justify-content: flex-end;
                padding-top: 10px;
                border-top: 1px dashed var(--border-color);
                margin-top: 6px;
            }
            .delete-col { display: none; }
            body.is-admin .delete-col { display: flex; }
        }

        @media (min-width: 768px) {
            body { padding: 24px; }
            header h1 { font-size: 28px; }
            .table-container { background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; }
            table { width: 100%; border-collapse: collapse; }
            th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
            th { background-color: rgba(15, 23, 42, 0.2); color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
            .form-group { flex-direction: row; }
            .form-group input, .file-input-wrapper { flex: 1; }
            
            .delete-col { display: none; }
            body.is-admin .delete-col { display: table-cell; }
        }
        
        .product-flex { display: flex; align-items: center; gap: 12px; }
        .product-img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; background: #334155; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .product-title { font-weight: 600; color: var(--text-color); font-size: 15px; }
        .product-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .status-bor { background: rgba(74, 222, 128, 0.1); color: var(--success-color); }
        .status-yoq { background: rgba(248, 113, 113, 0.1); color: var(--danger-color); }
        
        .delete-btn { background: rgba(248, 113, 113, 0.1); color: var(--danger-color); border: 1px solid rgba(248, 113, 113, 0.2); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        footer { margin-top: auto; text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border-color); }
        footer strong { color: var(--accent-color); }
        
        .admin-login-link { color: var(--text-muted); text-decoration: none; cursor: pointer; font-size: 12px; margin-left: 5px; }
        .admin-login-link:hover { color: var(--accent-color); }

        /* 📱 MOBIL VA KOMPYUTER UCHUN MAXSUS KIRISH OYNASI */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 14px; font-size: 16px; color: var(--text-color); }
        .modal-content input {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            letter-spacing: 3px;
        }
        .modal-content input:focus { border-color: var(--accent-color); }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .btn-submit { background: var(--accent-color); color: #fff; }
        .btn-cancel { background: rgba(248, 113, 113, 0.1); color: var(--danger-color); border: 1px solid rgba(248, 113, 113, 0.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="admin-indicator" class="admin-badge">⚡ ADMIN REJIM</div>
        <button class="theme-btn" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>

    <header>
        <h1>🏪 Do'kon "Ombor" Tizimi</h1>
        <div class="balance-card">💰 Umumiy Qiymat: <span id="total-shop-balance">0</span> so'm</div>
    </header>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-box" class="search-input" placeholder="Mahsulot nomini yozing..." oninput="handleSearch()">
        <button id="search-clear-btn" class="search-clear" onclick="clearSearch()">❌</button>
    </div>

    <div class="categories-menu" id="categories-list">
        <button class="category-btn active" onclick="filterCategory('all', event)">🔥 Hammasi</button>
        <button class="category-btn" onclick="filterCategory('Choylar', event)">☕ Choylar</button>
        <button class="category-btn" onclick="filterCategory('Shirinliklar', event)">🍬 Shirinliklar</button>
        <button class="category-btn" onclick="filterCategory('Pecheniylar', event)">🍪 Pecheniylar</button>
        <button class="category-btn" onclick="filterCategory('Sabzavotlar', event)">🥕 Sabzavotlar</button>
        <button class="category-btn" onclick="filterCategory('Kalbasalar', event)">🍖 Kalbasalar</button>
        <button class="category-btn" onclick="filterCategory('Ovqat mahsulotlari', event)">🍲 Ovqat mahsulotlari</button>
        <button class="category-btn" onclick="filterCategory('Go\'shtlar', event)">🥩 Go'shtlar</button>
        <button class="category-btn" onclick="filterCategory('O\'yinchoqlar', event)">🧸 O'yinchoqlar</button>
        <button class="category-btn" onclick="filterCategory('Oshxona bo\'limi', event)">🍽️ Oshxona bo'limi</button>
        <button class="category-btn" onclick="filterCategory('Ayollar bo\'limi', event)">👜 Ayollar bo'limi</button>
        <button class="category-btn" onclick="filterCategory('Suvlar', event)">💧 Suvlar</button>
        <button class="category-btn" onclick="filterCategory('Boshqa narsalar', event)">📦 Boshqa narsalar</button>
    </div>

    <div class="controls-panel" id="add-panel">
        <h3 id="panel-title" style="margin-bottom: 12px; color: var(--accent-color); font-size: 14px;"></h3>
        <div class="form-group">
            <input type="text" id="p-name" placeholder="Mahsulot nomi">
            <input type="number" id="p-price" placeholder="Dona/Kg narxi">
            <input type="number" id="p-qty" placeholder="Soni">
            
            <div class="file-input-wrapper">
                <span id="file-label">📸 Surat yuklash</span>
                <input type="file" id="p-image" accept="image/*" onchange="processAndCompressImage()">
            </div>

            <button class="add-btn" onclick="addNewProduct()">➕ Qo'shish</button>
        </div>
    </div>

    <div class="table-container">
        <div id="loading-indicator" class="loading-text">🔄 Internetdan ma'lumotlar yuklanmoqda...</div>
        <table>
            <tbody id="products-table-body"></tbody>
        </table>
    </div>

    <footer>Created by <strong>@old_crt</strong> | <span class="admin-login-link" onclick="handleLoginClick()">Tizimga kirish</span></footer>

    <!-- 🚪 LUX MODAL LOGIN OYNA -->
    <div id="login-modal" class="custom-modal">
        <div class="modal-content">
            <h3>🔐 Admin parolini kiriting</h3>
            <input type="password" id="modal-password-input" placeholder="••••" inputmode="numeric">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeLoginModal()">Yopish</button>
                <button class="btn-submit" onclick="submitAdminPassword()">Kirish</button>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://meningomborim-5277b-default-rtdb.firebaseio.com";

        let mahsulotlar = [];
        let joriyBolim = 'all';
        let joriyRasmBase64 = "";
        let qidiruvMatni = "";
        let isAdmin = false;

        function checkAdminStatus() {
            if (localStorage.getItem('ombor_admin') === 'true') {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('admin-indicator').style.display = 'block';
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
                document.getElementById('admin-indicator').style.display = 'none';
            }
        }

        function handleLoginClick() {
            if (isAdmin) {
                if (confirm("Admin rejimidan chiqmoqchimisiz?")) {
                    localStorage.removeItem('ombor_admin');
                    checkAdminStatus();
                    filterCategory(joriyBolim);
                }
            } else {
                document.getElementById('modal-password-input').value = "";
                document.getElementById('login-modal').style.display = 'flex';
                document.getElementById('modal-password-input').focus();
            }
        }

        function closeLoginModal() {
            document.getElementById('login-modal').style.display = 'none';
        }

        function submitAdminPassword() {
            const inputPass = document.getElementById('modal-password-input').value;
            
            // "0571" parolini tekshirish
            if (inputPass === "0571") {
                localStorage.setItem('ombor_admin', 'true');
                checkAdminStatus();
                filterCategory(joriyBolim);
                closeLoginModal();
                alert("Siz muvaffaqiyatli tanindingiz! Endi tovar qo'sha olasiz.");
            } else {
                alert("Noto'g'ri parol kiritildi!");
            }
        }

        function loadProductsFromFirebase() {
            fetch(`${FIREBASE_URL}/mahsulotlar.json`)
                .then(res => res.json())
                .then(data => {
                    mahsulotlar = [];
                    if (data) {
                        Object.keys(data).forEach(key => {
                            mahsulotlar.push({ firebaseId: key, ...data[key] });
                        });
                    }
                    document.getElementById('loading-indicator').style.display = 'none';
                    renderTable();
                    hisoblangUmumiyBalans();
                })
                .catch(err => {
                    document.getElementById('loading-indicator').innerText = "❌ Internetga ulanishda xatolik!";
                });
        }

        function handleSearch() {
            const searchBox = document.getElementById('search-box');
            const clearBtn = document.getElementById('search-clear-btn');
            qidiruvMatni = searchBox.value.toLowerCase().trim();
            clearBtn.style.display = qidiruvMatni.length > 0 ? 'block' : 'none';
            renderTable();
        }

        function clearSearch() {
            document.getElementById('search-box').value = "";
            document.getElementById('search-clear-btn').style.display = 'none';
            qidiruvMatni = "";
            renderTable();
        }

        function processAndCompressImage() {
            const file = document.getElementById('p-image').files[0];
            if (!file) return;
            document.getElementById('file-label').innerText = "⚡...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    canvas.width = 44;
                    canvas.height = 44;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 44, 44);
                    joriyRasmBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('file-label').innerText = "✅ Tayyor";
                };
            };
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '';
            
            const elangan = mahsulotlar.filter(p => {
                const bolimTo'g'ri = (joriyBolim === 'all' || p.bolim === joriyBolim);
                const qidiruvTo'g'ri = p.nomi.toLowerCase().includes(qidiruvMatni);
                return bolimTo'g'ri && qidiruvTo'g'ri;
            });

            if(elangan.length === 0 && mahsulotlar.length > 0) {
                tbody.innerHTML = '<tr><td style="text-align:center;color:var(--text-muted);padding:20px;">Mahsulot topilmadi</td></tr>';
                return;
            }

            elangan.forEach(p => {
                const jami = p.narxi * p.soni;
                const status = p.soni > 0 ? '<span class="status-badge status-bor">Bor</span>' : '<span class="status-badge status-yoq">Tugagan</span>';
                const rasmKodi = p.rasm ? `<img src="${p.rasm}" class="product-img">` : `<div class="product-img">📦</div>`;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="product-flex">
                                ${rasmKodi}
                                <div>
                                    <span class="product-title">${p.nomi}</span>
                                    <span class="product-meta">${p.bolim} • ${p.soni} dona/kg</span>
                                </div>
                            </div>
                        </td>
                        <td>${p.narxi.toLocaleString()} so'm</td>
                        <td><strong>${jami.toLocaleString()} so'm</strong></td>
                        <td>${status}</td>
                        <td class="delete-col"><button class="delete-btn" onclick="deleteProduct('${p.firebaseId}')">❌</button></td>
                    </tr>
                `;
            });
        }

        function hisoblangUmumiyBalans() {
            let jami = 0;
            mahsulotlar.forEach(p => { jami += p.narxi * p.soni; });
            document.getElementById('total-shop-balance').innerText = jami.toLocaleString();
        }

        function filterCategory(bolimNomi, event) {
            joriyBolim = bolimNomi;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');

            const addPanel = document.getElementById('add-panel');
            if(bolimNomi === 'all' || !isAdmin) {
                addPanel.classList.remove('show');
            } else {
                addPanel.classList.add('show');
                document.getElementById('panel-title').innerText = `➕ [${bolimNomi}] bo'limiga tovar`;
            }
            renderTable();
        }

        function addNewProduct() {
            if(!isAdmin) return alert("Sizda tovar qo'shish huquqi yo'q!");
            
            const nomi = document.getElementById('p-name').value;
            const narxi = parseFloat(document.getElementById('p-price').value);
            const soni = parseFloat(document.getElementById('p-qty').value);

            if(!nomi || isNaN(narxi) || isNaN(soni)) return alert("Ma'lumot to'liq emas!");

            const yangiMahsulot = { nomi, bolim: joriyBolim, narxi, soni, rasm: joriyRasmBase64 };

            fetch(`${FIREBASE_URL}/mahsulotlar.json`, {
                method: 'POST',
                body: JSON.stringify(yangiMahsulot)
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-qty').value = '';
                document.getElementById('p-image').value = '';
                document.getElementById('file-label').innerText = "📸 Surat yuklash";
                joriyRasmBase64 = "";
                loadProductsFromFirebase();
            });
        }

        function deleteProduct(firebaseId) {
            if(!isAdmin) return alert("Sizda tovar o'chirish huquqi yo'q!");
            
            if(confirm("Ushbu mahsulot onlayn bazadan butunlay o'chirilsinmi?")) {
                fetch(`${FIREBASE_URL}/mahsulotlar/${firebaseId}.json`, {
                    method: 'DELETE'
                })
                .then(() => {
                    loadProductsFromFirebase();
                });
            }
        }

        if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
        
        checkAdminStatus();
        loadProductsFromFirebase();
    </script>
</body>
</html>
